<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Ford Focus">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <ellipse cx="400" cy="356" rx="240" ry="26" fill="rgba(0,0,0,0.18)"/>
  
    <g>
      <!-- wheels -->
      <circle cx="262" cy="300" r="46" fill="#111827"/>
      <circle cx="262" cy="300" r="18" fill="rgba(255,255,255,0.85)"/>
      <circle cx="538" cy="300" r="46" fill="#111827"/>
      <circle cx="538" cy="300" r="18" fill="rgba(255,255,255,0.85)"/>
      <!-- body -->
      <rect x="168" y="206" width="464" height="92" rx="34" fill="rgba(255,255,255,0.94)"/>
      <!-- cabin -->
      <path d="M298 210 L322 160 Q327 151 340 151 L470 151 Q483 151 488 160 L512 210 Z" fill="rgba(255,255,255,0.94)"/>
      <!-- windows -->
      <path d="M330 204 L346 169 L394 169 L394 204 Z" fill="rgba(15,23,42,0.32)"/>
      <path d="M406 169 L462 169 L480 204 L406 204 Z" fill="rgba(15,23,42,0.32)"/>
      <!-- headlight -->
      <rect x="612" y="232" width="18" height="16" rx="6" fill="rgba(253,224,71,0.95)"/>
    </g>
  <text x="44" y="412" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="600" fill="rgba(255,255,255,0.96)">Ford Focus</text>
</svg>
